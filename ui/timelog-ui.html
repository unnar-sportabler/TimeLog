<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Timelog review</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root {
    --bg: #14161a; --panel: #1d2026; --row: #23272f; --row-hover: #2a2f38;
    --text: #e6e8ec; --dim: #8b919c; --accent: #4f9cf9; --accent-dim: #2b5da8;
    --warn: #f0b429; --danger: #e5534b; --ok: #4caf78; --bar-bg: #2e333d;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, "SF Pro Text", sans-serif; display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 290px; min-width: 290px; background: var(--panel); padding: 16px 10px; overflow-y: auto; flex-shrink: 0; }
  #sidebar h1 { font-size: 15px; padding: 0 8px 12px; color: var(--dim); font-weight: 600; display: flex; align-items: center; gap: 8px; }
  #sidebar h1 img { width: 26px; height: 26px; border-radius: 6px; }
  #reload-btn { margin-left: auto; background: none; border: none; color: var(--dim); font-size: 17px; cursor: pointer; border-radius: 6px; padding: 2px 6px; }
  #reload-btn:hover { color: var(--text); background: var(--row-hover); }
  #reload-btn.spinning { animation: spin .6s linear; }
  @keyframes spin { from { transform: rotate(0) } to { transform: rotate(360deg) } }
  .day-item { padding: 8px 10px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; gap: 8px; white-space: nowrap; }
  .day-item .date { overflow: hidden; text-overflow: ellipsis; }
  .day-item:hover { background: var(--row-hover); }
  .day-item.active { background: var(--accent-dim); }
  .day-item .tot { color: var(--dim); font-variant-numeric: tabular-nums; }
  .day-item .wd { color: var(--dim); display: inline-block; width: 30px; font-size: 12px; }
  #header .wd-long { color: var(--dim); font-weight: 400; }
  label.fill-toggle { color: var(--dim); cursor: pointer; user-select: none; }
  #submit-btn { background: var(--ok); border: none; color: #fff; font-weight: 600; border-radius: 8px; padding: 6px 16px; cursor: pointer; }
  #submit-btn:hover { filter: brightness(1.1); }
  #submit-btn:disabled { background: #3a4150; cursor: default; }
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; margin-right: 7px; }
  .submitting #rows { opacity: .45; pointer-events: none; }
  #submit-status { margin: 10px 0; font-size: 13px; }
  #submit-status .ok { color: var(--ok); }
  #submit-status .fail { color: var(--danger); }
  #settings-link { margin-top: 14px; padding: 8px 10px; color: var(--dim); cursor: pointer; border-radius: 8px; font-size: 13px; }
  #settings-link:hover { background: var(--row-hover); color: var(--text); }
  #modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; z-index: 10; }
  #modal { background: var(--panel); border-radius: 14px; padding: 24px; width: 440px; }
  #modal h3 { margin-bottom: 4px; }
  #modal .sub { color: var(--dim); font-size: 12px; margin-bottom: 16px; }
  #modal .sub a { color: var(--accent); }
  #modal label { display: block; color: var(--dim); font-size: 12px; margin: 10px 0 3px; }
  #modal input { width: 100%; background: var(--row); border: 1px solid #3a4150; border-radius: 7px; color: var(--text); padding: 7px 10px; font: inherit; }
  #modal .btns { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
  #modal .btns button { border-radius: 7px; padding: 6px 14px; cursor: pointer; border: 1px solid #3a4150; background: none; color: var(--text); }
  #modal .btns .primary { background: var(--accent); border: none; font-weight: 600; }
  #modal .result { margin-top: 12px; font-size: 13px; }
  #modal .result .ok { color: var(--ok); }
  #modal .result .fail { color: var(--danger); }
  .day-item.warn .date::after { content: " ⚠️"; font-size: 11px; }
  #main { flex: 1; overflow-y: auto; padding: 24px 32px; }
  #header { display: flex; align-items: baseline; gap: 18px; margin-bottom: 18px; flex-wrap: wrap; }
  #header h2 { font-size: 20px; }
  #header .spacer { flex: 1; }
  label.target { color: var(--dim); }
  input.target-input { width: 56px; background: var(--row); color: var(--text); border: 1px solid #3a4150; border-radius: 6px; padding: 3px 6px; text-align: right; }
  #total-line { color: var(--dim); margin-bottom: 16px; }
  #total-line b { color: var(--text); }
  #total-line .over { color: var(--warn); }
  .row { background: var(--row); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
  .row:hover { background: var(--row-hover); }
  .row-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .row-head input { background: transparent; border: 1px solid transparent; border-radius: 6px; color: var(--text); font: inherit; font-weight: 600; width: 100px; padding: 2px 4px; flex-shrink: 0; }
  .row-head input:hover, .row-head input:focus { border-color: #3a4150; background: var(--bg); outline: none; }
  .row-head input.unknown { color: var(--warn); }
  .row-head .title { color: var(--text); font-size: 13px; opacity: .85; min-width: 0; }
  .row-head a { color: var(--accent); text-decoration: none; font-size: 13px; flex-shrink: 0; }
  .row-head a:hover { text-decoration: underline; }
  .row-grid { display: grid; grid-template-columns: 200px 1fr 120px 70px; gap: 14px; align-items: center; }
  .row .meta-info { color: var(--dim); font-size: 12px; }
  .row .meta-info .expand { cursor: pointer; color: var(--accent); user-select: none; }
  .sessions { grid-column: 1 / -1; border-top: 1px solid #313845; margin-top: 4px; padding-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .session-row { display: flex; gap: 10px; align-items: baseline; font-size: 12.5px; }
  .session-row .s-time { color: var(--dim); min-width: 48px; text-align: right; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .session-row .s-desc { flex: 1; color: var(--dim); }
  .session-row .s-desc .prompt { color: var(--text); opacity: .8; display: block; }
  .session-row button { background: none; border: 1px solid #3a4150; color: var(--dim); border-radius: 5px; cursor: pointer; font-size: 11px; padding: 1px 7px; flex-shrink: 0; }
  .session-row button:hover { color: var(--text); }
  .session-row button.danger:hover { color: var(--danger); border-color: var(--danger); }
  .bar-wrap { position: relative; height: 30px; background: var(--bar-bg); border-radius: 7px; overflow: hidden; cursor: ew-resize; }
  .bar { position: absolute; inset: 0 auto 0 0; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); border-radius: 7px; min-width: 6px; }
  .bar.locked { background: linear-gradient(90deg, #7444a8, #a06ae0); }
  .bar-label { position: absolute; inset: 0; display: flex; align-items: center; padding-left: 10px; font-variant-numeric: tabular-nums; font-weight: 600; font-size: 13px; pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,.5); }
  .handle { position: absolute; top: 0; bottom: 0; width: 10px; cursor: ew-resize; }
  .mins { text-align: right; font-variant-numeric: tabular-nums; }
  .mins .lock-ind { cursor: pointer; margin-left: 4px; }
  .mins .raw { display: block; color: var(--dim); font-size: 11px; }
  .actions { display: flex; gap: 6px; justify-content: flex-end; }
  .actions button { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 15px; padding: 2px; border-radius: 5px; }
  .actions button:hover { color: var(--text); background: var(--bg); }
  #logged-section { margin-bottom: 16px; }
  #logged-section h3 { color: var(--dim); font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .logged-row { display: flex; gap: 10px; align-items: baseline; font-size: 13px; padding: 2px 14px; color: var(--dim); }
  .logged-row .l-check { color: var(--ok); flex-shrink: 0; }
  .logged-row .l-mins { min-width: 52px; text-align: right; font-variant-numeric: tabular-nums; color: var(--text); opacity: .8; flex-shrink: 0; }
  .logged-row .l-ticket { color: var(--accent); font-weight: 600; flex-shrink: 0; }
  .logged-row .l-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #suggestions-section { margin-top: 26px; }
  #suggestions-section h3 { color: var(--dim); font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .suggestion-row { display: flex; gap: 10px; align-items: center; font-size: 13px; padding: 3px 14px; color: var(--dim); }
  .suggestion-row .s-ticket { color: var(--accent); font-weight: 600; flex-shrink: 0; }
  .suggestion-row .s-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .suggestion-row .s-mins { flex-shrink: 0; font-variant-numeric: tabular-nums; color: var(--text); opacity: .8; }
  .suggestion-row button { background: var(--accent-dim); border: none; color: #fff; border-radius: 7px; cursor: pointer; font-size: 16px; font-weight: 700; width: 28px; height: 28px; line-height: 1; flex-shrink: 0; }
  .suggestion-row button:hover { background: var(--accent); }
  #meta-section { margin-top: 26px; }
  #meta-section h3 { color: var(--dim); font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .meta-row { color: var(--dim); font-size: 13px; padding: 4px 14px; display: flex; gap: 10px; align-items: center; }
  .meta-row button { background: none; border: 1px solid #3a4150; color: var(--dim); border-radius: 5px; cursor: pointer; font-size: 11px; padding: 1px 7px; }
  .meta-row button:hover { color: var(--text); }
  #danger-zone { margin-top: 30px; }
  #danger-zone button { background: none; border: 1px solid var(--danger); color: var(--danger); border-radius: 7px; padding: 5px 12px; cursor: pointer; }
  .empty { color: var(--dim); margin-top: 40px; text-align: center; }
  .hint { color: var(--dim); font-size: 12px; margin-top: 14px; }
</style>
</head>
<body>
<div id="sidebar"><h1><img src="/logo.svg" alt=""> Timelog
  <button id="reload-btn" title="Reload data">↻</button></h1><div id="day-list"></div>
  <div id="settings-link">⚙️ Tokens & settings</div></div>
<div id="main"><div class="empty">Pick a day</div></div>
<script>
let currentDate = null;
let dayData = null;

const fmt = m => { const h = Math.floor(m / 60), r = m % 60;
  return h && r ? `${h}h ${r}m` : h ? `${h}h` : `${r}m`; };
const weekday = (date, style) =>
  new Date(date + "T12:00:00").toLocaleDateString("en-US", { weekday: style });

async function api(path, body) {
  const res = await fetch(path, body
    ? { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body) }
    : undefined);
  return res.json();
}

async function loadDays() {
  const days = await api("/api/days");
  const list = document.getElementById("day-list");
  list.innerHTML = "";
  for (const d of days) {
    const el = document.createElement("div");
    el.className = "day-item" + (d.unknown ? " warn" : "") + (d.date === currentDate ? " active" : "");
    el.innerHTML = `<span class="date"><span class="wd">${weekday(d.date, "short")}</span> ${d.date}</span><span class="tot">${fmt(d.minutes)}</span>`;
    el.onclick = () => openDay(d.date);
    list.appendChild(el);
  }
  if (!days.length) document.getElementById("main").innerHTML = '<div class="empty">Nothing unsubmitted 🎉</div>';
}

async function openDay(date) {
  currentDate = date;
  dayData = await api("/api/day/" + date);
  render();
  loadDays();
  loadSuggestions(date);
}

async function act(body) {
  const date = currentDate;
  dayData = await api("/api/day/" + date, body);
  render();
  loadDays();
  loadSuggestions(date);
}

async function loadSuggestions(date) {
  const sec = document.getElementById("suggestions-section");
  if (!sec) return;
  const res = await api("/api/activity/" + date);
  if (date !== currentDate || !res.suggestions.length) { if (sec) sec.innerHTML = ""; return; }
  sec.innerHTML = "<h3>Suggestions — your Jira activity this day</h3>";
  for (const s of res.suggestions) {
    const el = document.createElement("div");
    el.className = "suggestion-row";
    const btn = document.createElement("button");
    btn.textContent = "+";
    btn.title = `Add as ${fmt(s.minutes)} entry (drag to adjust after)`;
    btn.onclick = () => act({ action: "add_suggestion", new_ticket: s.ticket, minutes: s.minutes, title: s.title });
    el.appendChild(btn);
    el.insertAdjacentHTML("beforeend",
      `<span class="s-ticket">${s.icon || ""}${s.ticket || ""}</span><span class="s-title">${s.title}</span><span class="s-mins">${fmt(s.minutes)}</span>`);
    sec.appendChild(el);
  }
}

function render() {
  const d = dayData;
  const main = document.getElementById("main");
  if (!d.groups.length) { main.innerHTML = '<div class="empty">Day is empty now.</div>'; currentDate = null; return; }
  const total = d.groups.reduce((s, g) => s + g.allocated_min, 0);
  const over = total > d.target;
  main.innerHTML = `
    <div id="header">
      <h2>${d.date} <span class="wd-long">— ${weekday(d.date, "long")}</span></h2>
      <span class="spacer"></span>
      <label class="fill-toggle" title="When off, dragging one bar leaves the others untouched (no auto-fill to target)">
        <input type="checkbox" class="fill-check" ${d.fill ? "checked" : ""}> auto-fill
      </label>
      <label class="target">Target
        <input class="target-input" type="number" step="0.5" min="0.25" value="${d.target / 60}"> h
      </label>
      <button id="submit-btn" title="Create Tempo worklogs for every row">Submit day</button>
    </div>
    <div id="total-line">Allocated: <b>${fmt(total)}</b> of ${fmt(d.target)}
      ${d.already ? `<span> · ${fmt(d.already)} already in Tempo</span>` : ""}
      ${over ? '<span class="over">— over target</span>' : total < d.target ? `<span>— ${fmt(d.target - total)} unfilled</span>` : "— exact ✓"}
      ${d.fill ? "" : '<span> · auto-fill off</span>'}
    </div>
    <div id="submit-status"></div>
    <div id="logged-section"></div>
    <div id="rows"></div>
    <div id="suggestions-section"></div>
    <div id="meta-section"></div>
    <div id="danger-zone"><button id="del-day">Delete entire day</button></div>
    <div class="hint">Drag a bar to set time (15-min snap, 🔒 = pinned; click 🔒 to unpin and let it auto-distribute). Click a ticket to rename. Changes save instantly and flow into /submit-times.</div>`;

  main.querySelector(".target-input").onchange = e =>
    act({ action: "set_target", target: Math.round(parseFloat(e.target.value) * 60) });
  main.querySelector(".fill-check").onchange = e =>
    act({ action: "set_fill", fill: e.target.checked });

  const submitBtn = main.querySelector("#submit-btn");
  submitBtn.onclick = async () => {
    if (d.groups.some(g => g.ticket === "unknown")) {
      alert("Assign a ticket to every row first (or delete / mark not-work the unknown ones).");
      return;
    }
    const lines = d.groups.map(g => `  ${g.ticket}  ${fmt(g.allocated_min)}`).join("\n");
    if (!confirm(`Submit ${d.groups.length} worklog(s) to Tempo for ${d.date}?\n\n${lines}`)) return;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>Submitting…';
    document.getElementById("main").classList.add("submitting");
    let res;
    try {
      res = await api("/api/submit/" + d.date, {});
    } catch (e) {
      res = { error: "Request failed: " + e.message };
    }
    document.getElementById("main").classList.remove("submitting");
    if (res.error) {
      document.getElementById("submit-status").innerHTML = `<span class="fail">${res.error}</span>`;
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit day";
      return;
    }
    const okCount = res.results.filter(r => r.ok).length;
    const failed = res.results.filter(r => !r.ok);
    let msg = `<span class="ok">✓ ${okCount} worklog(s) submitted.</span>`;
    if (failed.length) msg += " " + failed.map(f => `<span class="fail">✗ ${f.ticket}: ${f.error}</span>`).join(" ");
    dayData = res.day;
    if (dayData.groups.length) { render(); document.getElementById("submit-status").innerHTML = msg; }
    else {
      document.getElementById("main").innerHTML = `<div class="empty">${msg}<br>Day fully submitted 🎉</div>`;
      currentDate = null;
    }
    loadDays();
  };
  main.querySelector("#del-day").onclick = () => {
    if (confirm(`Delete all entries for ${d.date}?`)) act({ action: "delete_day" });
  };

  if (d.logged && d.logged.length) {
    const sec = main.querySelector("#logged-section");
    const tot = d.logged.reduce((s, w) => s + w.minutes, 0);
    sec.innerHTML = `<h3>Already in Tempo — ${fmt(tot)}</h3>`;
    for (const w of d.logged) {
      const el = document.createElement("div");
      el.className = "logged-row";
      el.innerHTML = `<span class="l-check">✓</span><span class="l-mins">${fmt(w.minutes)}</span>
        <span class="l-ticket">${w.ticket || "?"}</span><span class="l-title">${w.title || w.description}</span>`;
      sec.appendChild(el);
    }
  }

  const rows = main.querySelector("#rows");
  for (const g of d.groups) rows.appendChild(renderRow(g));

  const metaSec = main.querySelector("#meta-section");
  if (d.meta.length) {
    metaSec.innerHTML = "<h3>Meta / ignored sessions (not submitted)</h3>";
    for (const m of d.meta) {
      const el = document.createElement("div");
      el.className = "meta-row";
      el.innerHTML = `<span>${fmt(m.minutes)}</span><span>${m.description || "(no description)"}</span>`;
      const btn = document.createElement("button");
      btn.textContent = "restore as work";
      btn.onclick = () => act({ action: "restore_meta", session_id: m.session_id });
      el.appendChild(btn);
      metaSec.appendChild(el);
    }
  }
}

function renderRow(g) {
  const row = document.createElement("div");
  row.className = "row";
  const pct = Math.min(100, g.allocated_min / dayData.target * 100);
  const repos = g.repos.join(", ") || "(no repo)";
  const jiraLink = g.ticket !== "unknown" && dayData.jira_base
    ? `<a href="${dayData.jira_base}/browse/${g.ticket}" target="_blank" title="Open in Jira">↗</a>` : "";
  row.innerHTML = `
    <div class="row-head">
      <input value="${g.ticket === "unknown" ? "" : g.ticket}"
        placeholder="AB-…" class="${g.ticket === "unknown" ? "unknown" : ""}">
      <span class="title">${g.title || ""}</span>
      ${jiraLink}
    </div>
    <div class="row-grid">
      <div class="meta-info">${repos} · ${g.edit_count} edits ·
        <span class="expand">▸ ${g.sessions} session${g.sessions !== 1 ? "s" : ""}</span></div>
      <div class="bar-wrap">
        <div class="bar ${g.locked ? "locked" : ""}" style="width:${pct}%"></div>
        <div class="bar-label">${fmt(g.allocated_min)}</div>
        <div class="handle" style="left:calc(${pct}% - 5px)"></div>
      </div>
      <div class="mins">${fmt(g.allocated_min)}${g.locked ? '<span class="lock-ind" title="Unpin">🔒</span>' : ""}
        <span class="raw">tracked ${fmt(g.raw_minutes)}</span></div>
      <div class="actions">
        <button title="Mark as not work">🚫</button>
        <button title="Delete">🗑</button>
      </div>
    </div>`;

  const input = row.querySelector("input");
  input.onchange = () => {
    const v = input.value.trim().toUpperCase();
    if (/^AB-\d+$/.test(v)) act({ action: "set_ticket", ticket: g.ticket, repos: g.repos, new_ticket: v });
    else { alert("Expected AB-#### format"); input.value = g.ticket === "unknown" ? "" : g.ticket; }
  };
  input.onkeydown = e => { if (e.key === "Enter") input.blur(); };

  const [notWorkBtn, delBtn] = row.querySelectorAll(".actions button");
  notWorkBtn.onclick = () => act({ action: "set_category", ticket: g.ticket, repos: g.repos, category: "meta" });
  delBtn.onclick = () => {
    if (confirm(`Delete ${g.ticket} (${fmt(g.raw_minutes)} tracked)?`)) act({ action: "delete_group", ticket: g.ticket, repos: g.repos });
  };

  const lockInd = row.querySelector(".lock-ind");
  if (lockInd) lockInd.onclick = () => act({ action: "clear_lock", ticket: g.ticket, repos: g.repos });

  // Expandable session inspector — first prompts fetched from the transcript
  const expand = row.querySelector(".expand");
  let sessionsEl = null;
  expand.onclick = async () => {
    if (sessionsEl) { sessionsEl.remove(); sessionsEl = null; expand.textContent = expand.textContent.replace("▾", "▸"); return; }
    expand.textContent = expand.textContent.replace("▸", "▾");
    sessionsEl = document.createElement("div");
    sessionsEl.className = "sessions";
    for (const e of g.entries) {
      const s = document.createElement("div");
      s.className = "session-row";
      s.innerHTML = `<span class="s-time">${fmt(e.minutes)}</span>
        <span class="s-desc">${e.description || ""}<span class="prompt">loading…</span></span>`;
      const assign = document.createElement("button");
      assign.textContent = "assign ticket";
      assign.onclick = () => {
        const v = (prompt("Jira ticket for this session:", "AB-") || "").trim().toUpperCase();
        if (/^AB-\d+$/.test(v)) act({ action: "set_entry_ticket", ticket: g.ticket, repos: g.repos, session_id: e.session_id, new_ticket: v });
        else if (v) alert("Expected AB-#### format");
      };
      const del = document.createElement("button");
      del.className = "danger";
      del.textContent = "delete";
      del.onclick = () => {
        if (confirm(`Delete this ${fmt(e.minutes)} session entry?`)) act({ action: "delete_entry", ticket: g.ticket, repos: g.repos, session_id: e.session_id });
      };
      s.append(assign, del);
      sessionsEl.appendChild(s);
      api("/api/session/" + e.session_id).then(r => {
        const p = s.querySelector(".prompt");
        p.textContent = r.prompts.length ? "» " + r.prompts.join("  »  ") : "(no transcript found)";
      });
    }
    row.appendChild(sessionsEl);
  };

  // Drag-to-resize with 15-min snapping
  const wrap = row.querySelector(".bar-wrap");
  const bar = row.querySelector(".bar");
  const label = row.querySelector(".bar-label");
  wrap.onmousedown = e => {
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    let minutes = g.allocated_min;
    const move = ev => {
      const frac = Math.min(1.5, Math.max(0, (ev.clientX - rect.left) / rect.width));
      minutes = Math.max(15, Math.round(frac * dayData.target / 15) * 15);
      bar.style.width = Math.min(100, minutes / dayData.target * 100) + "%";
      bar.classList.add("locked");
      label.textContent = fmt(minutes);
    };
    const up = () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
      act({ action: "set_lock", ticket: g.ticket, repos: g.repos, minutes });
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    move(e);
  };
  return row;
}

document.getElementById("settings-link").onclick = async () => {
  const s = await api("/api/settings");
  const bg = document.createElement("div");
  bg.id = "modal-bg";
  bg.innerHTML = `<div id="modal">
    <h3>Tokens & settings</h3>
    <div class="sub">Stored in ~/.claude/timelog/jira-credentials (chmod 600, local only).
      Get tokens: <a href="https://id.atlassian.com/manage-profile/security/api-tokens" target="_blank">Jira</a> ·
      Tempo → Settings → API Integration. Leave a field empty to keep its current value.</div>
    <label>Jira email</label>
    <input id="s-email" value="${s.jira_email}" placeholder="you@abler.io">
    <label>Jira API token ${s.has_jira_token ? "(set ✓)" : "(missing)"}</label>
    <input id="s-jira" type="password" placeholder="${s.has_jira_token ? "unchanged" : "paste token"}">
    <label>Tempo API token ${s.has_tempo_token ? "(set ✓)" : "(missing)"}</label>
    <input id="s-tempo" type="password" placeholder="${s.has_tempo_token ? "unchanged" : "paste token"}">
    <div class="result"></div>
    <div class="btns"><button id="s-close">Close</button><button class="primary" id="s-save">Save & verify</button></div>
  </div>`;
  document.body.appendChild(bg);
  bg.onclick = e => { if (e.target === bg) bg.remove(); };
  bg.querySelector("#s-close").onclick = () => bg.remove();
  bg.querySelector("#s-save").onclick = async () => {
    const result = bg.querySelector(".result");
    result.textContent = "Verifying…";
    const r = await api("/api/settings", {
      jira_email: bg.querySelector("#s-email").value,
      jira_token: bg.querySelector("#s-jira").value,
      tempo_token: bg.querySelector("#s-tempo").value,
    });
    result.innerHTML =
      (r.jira_ok ? `<div class="ok">✓ Jira: authenticated as ${r.jira_user}</div>`
                 : `<div class="fail">✗ Jira: ${r.jira_error || "missing credentials"}</div>`) +
      (r.tempo_ok ? `<div class="ok">✓ Tempo: token works</div>`
                  : `<div class="fail">✗ Tempo: ${r.tempo_error || "missing token"}</div>`);
    if (r.jira_ok && r.tempo_ok && currentDate) openDay(currentDate);
  };
};

function reloadAll() {
  loadDays();
  if (currentDate) openDay(currentDate);
}

// Refresh from disk whenever the app regains focus (dock web app has no reload UI)
window.addEventListener("focus", reloadAll);

document.getElementById("reload-btn").onclick = e => {
  e.target.classList.remove("spinning");
  void e.target.offsetWidth;
  e.target.classList.add("spinning");
  reloadAll();
};

loadDays().then(async () => {
  const first = document.querySelector(".day-item");
  if (first) first.click();
});
</script>
